apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: tailoring-app-hpa
  namespace: tailoring
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: tailoring-app
  minReplicas: 2     # Minimum number of pods to keep running
  maxReplicas: 10    # Maximum number of pods allowed during peak traffic
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50  # Scale up if average CPU utilization exceeds 50%

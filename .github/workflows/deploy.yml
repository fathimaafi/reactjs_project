name: CI/CD - Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Copy project files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          timeout: 60s
          source: "Dockerfile,nginx.conf,package.json,package-lock.json,src/,public/,k8s/"
          target: "~/reactjs-project/"

      - name: Build and Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          timeout: 300s
          script: |
            cd ~/reactjs-project

            # Build Docker image on EC2
            sudo docker build -t tailoring-app:latest .

            # Load image into minikube
            minikube image load tailoring-app:latest

            # Apply k8s manifests
            kubectl apply -f k8s/deployment.yml
            kubectl apply -f k8s/service.yml

            # Restart deployment to pick up new image
            kubectl rollout restart deployment/tailoring-app

            # Wait for rollout to complete
            kubectl rollout status deployment/tailoring-app

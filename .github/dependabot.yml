version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
      time: "12:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    versioning-strategy: increase
    labels:
      - "dependencies"
      - "javascript"
    commit-message:
      prefix: "chore"
      include: "scope"
    ignore:
      # react-scripts major versions can have breaking changes, review manually
      - dependency-name: "react-scripts"
        update-types: ["version-update:semver-major"]
    allow:
      - dependency-name: "react"
      - dependency-name: "react-dom"
      - dependency-name: "react-scripts"
